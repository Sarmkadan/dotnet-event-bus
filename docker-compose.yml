version: '3.8'

services:
  # Development environment with full SDK
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: dotnet-event-bus-dev
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget
    working_dir: /src
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    networks:
      - eventbus-network
    stdin_open: true
    tty: true

  # Testing environment
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: dotnet-event-bus-test
    volumes:
      - .:/src
      - test-results:/src/test-results
    working_dir: /src
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
    networks:
      - eventbus-network
    command: >
      bash -c "
        dotnet restore &&
        dotnet build -c Release &&
        dotnet test tests/DotnetEventBus.Tests -c Release
          --logger 'trx;LogFileName=/src/test-results/results.trx'
          --collect:'XPlat Code Coverage'
          --results-directory=/src/test-results/coverage
      "

  # Build stage - creates NuGet package
  build:
    build:
      context: .
      dockerfile: Dockerfile
      target: package
    container_name: dotnet-event-bus-build
    volumes:
      - build-artifacts:/artifacts
    working_dir: /artifacts
    networks:
      - eventbus-network
    command: bash -c "ls -la /artifacts"

  # Production-like environment
  production:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dotnet-event-bus-prod
    environment:
      - DOTNET_ENVIRONMENT=Production
    networks:
      - eventbus-network
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/app/.health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Example: EventBus with dependencies
  example-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: dotnet-event-bus-example
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget
    working_dir: /src
    ports:
      - "6000:6000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:6000
      - EventBus__MaxRetryAttempts=3
      - EventBus__AllowParallelHandling=true
      - EventBus__MaxConcurrentHandlers=8
    networks:
      - eventbus-network
    depends_on:
      - redis
    command: dotnet run --project examples/DotnetEventBus.Examples/DotnetEventBus.Examples.csproj

  # Redis for distributed caching/pub-sub
  redis:
    image: redis:7-alpine
    container_name: dotnet-event-bus-redis
    ports:
      - "6379:6379"
    networks:
      - eventbus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  # PostgreSQL for persistence (optional)
  postgres:
    image: postgres:16-alpine
    container_name: dotnet-event-bus-postgres
    environment:
      POSTGRES_DB: eventbus
      POSTGRES_USER: eventbus
      POSTGRES_PASSWORD: eventbus
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    networks:
      - eventbus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventbus"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql

  # Monitoring: Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: dotnet-event-bus-prometheus
    ports:
      - "9090:9090"
    networks:
      - eventbus-network
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Monitoring: Grafana (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: dotnet-event-bus-grafana
    ports:
      - "3000:3000"
    networks:
      - eventbus-network
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus

networks:
  eventbus-network:
    driver: bridge

volumes:
  nuget-cache:
  build-artifacts:
  test-results:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
